<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메이플 북마크 추가기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-icon">⚔️</div>
      <div>
        <h1 class="title">메이플 북마크</h1>
        <p class="subtitle">AI 스크린샷 분석기 (Gemini)</p>
      </div>
      <a class="btn-github" href="https://github.com/miamdaegun/maplescouter_ocr" target="_blank" title="GitHub 레포지토리">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </a>
    </header>

    <div class="update-banner" id="updateBanner" style="display:none">
      <span id="updateBannerText"></span>
      <a href="https://github.com/miamdaegun/maplescouter_ocr" target="_blank" class="update-link">GitHub 바로가기</a>
      <button class="update-dismiss" id="btnDismissUpdate">✕</button>
    </div>

    <div class="status-bar" id="statusBar">
      <span id="statusText">maplescouter.com에 접속해주세요</span>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="ocr">📷 스크린샷 분석(OCR)</button>
      <button class="tab" data-tab="list">북마크 목록</button>
      <button class="tab" data-tab="advanced">⚙️ 고급</button>
    </div>

    <div class="tab-content active" id="tab-ocr">

      <div class="section-title">Gemini 무료 API 설정</div>
      <div class="form-group">
        <label>API 키 <span class="required">*</span> <span style="color:var(--text-muted);font-weight:400">(aistudio.google.com)</span></label>
        <div class="api-key-row">
          <input type="password" id="visionApiKey" placeholder="AIzaSy..." autocomplete="off" />
          <button class="btn-small" id="btnSaveKey">저장</button>
        </div>
        <span class="api-key-status" id="apiKeyStatus"></span>
        <label class="auto-viewer-toggle" style="margin-top:6px">
          <input type="checkbox" id="chkAutoUpdate" />
          <span>실행 시 자동 업데이트 여부 체크</span>
        </label>
        <div class="backup-row">
          <button class="btn-small btn-backup" id="btnExportSettings">📤 세팅 백업</button>
          <button class="btn-small btn-backup" id="btnImportSettings">📥 세팅 복원</button>
          <input type="file" id="importFileInput" accept=".json" style="display:none" />
        </div>
      </div>

      <div class="section-title" style="margin-top:12px">사용 모델 선택</div>
      <div class="model-selector">
        <label class="model-option">
          <input type="radio" name="modelSelection" value="gemini-2.5-flash" checked>
          <div class="model-info">
            <div class="model-name">
              Gemini 2.5 Flash 
              <span class="quota-badge" id="quota-25">계산 중...</span>
            </div>
            <div class="model-desc">비상용 (분당 5회 / 하루 20회 제한)</div>
          </div>
        </label>
        <label class="model-option">
          <input type="radio" name="modelSelection" value="gemini-3.1-flash-lite-preview">
          <div class="model-info">
            <div class="model-name">
              Gemini 3.1 Flash-Lite
              <span class="quota-badge" id="quota-31">계산 중...</span>
            </div>
            <div class="model-desc">빠르고 넉넉함 (분당 15회 / 하루 500회 제한)</div>
            <div class="model-warning">⚠️ 서버 혼잡 시 일시적 오류가 발생할 수 있음</div>
          </div>
        </label>
      </div>

      <label class="auto-viewer-toggle" style="margin-top:10px">
        <input type="checkbox" id="chkAutoViewer" />
        <span>분석 후 자동 비교 팝업창 띄움</span>
      </label>
      <button class="btn-secondary btn-viewer-full" id="btnOpenViewer">🖼️ 원본 이미지 띄우기</button>

      <div class="section-title" style="margin-top:12px">아이템 스크린샷</div>
      <div class="drop-zone" id="dropZone">
        <div class="drop-icon">🖼️</div>
        <div class="drop-text">윈도우 캡처(Win+Shift+S) 후<br/>Ctrl+V (붙여넣기)<br/>또는 클릭 후 사진 선택</div>
        <input type="file" id="fileInput" accept="image/*" style="display:none" />
      </div>

      <div class="ocr-preview-wrap" id="ocrPreviewWrap" style="display:none">
        <img id="ocrPreview" class="ocr-preview" alt="미리보기" />
        <button class="btn-small ocr-clear" id="btnClearImage">✕ 초기화</button>
      </div>

      <button class="btn-ocr" id="btnRunOcr" disabled>🔍 AI로 아이템 옵션 읽기</button>
      <div class="ocr-status" id="ocrStatus" style="display:none"></div>

      <div id="ocrResult" style="display:none">
        <div class="section-title" style="margin-top:12px">
          파싱 결과 확인
          <span class="total-preview-label">수정 후 추가 가능</span>
        </div>
        <div class="ocr-parsed-grid" id="ocrParsedGrid"></div>
        
        <div class="action-row">
          <button class="btn-submit" id="btnOcrSubmit">📌 북마크에 추가</button>
          <button class="btn-secondary" id="btnResetState">🔄 초기화</button>
        </div>
      </div>
    </div>

    <div class="tab-content" id="tab-list">
      <div class="list-header">
        <span id="bookmarkCount">로딩 중...</span>
        <button class="btn-small" id="btnRefresh">🔄 새로고침</button>
      </div>
      <div id="bookmarkList" class="bookmark-list"></div>
    </div>

    <div class="tab-content" id="tab-advanced">
      <div class="section-title">Gemini 프롬프트 편집</div>
      <p class="prompt-desc">AI가 이미지를 분석할 때 사용하는 프롬프트입니다.<br/><span class="prompt-warn">⚠️ 잘못 수정하면 파싱이 제대로 되지 않을 수 있습니다.</span></p>
      <textarea id="promptEditor" class="prompt-editor" spellcheck="false"></textarea>
      <div class="action-row" style="margin-top:10px">
        <button class="btn-submit" id="btnSavePrompt">💾 저장</button>
        <button class="btn-secondary" id="btnResetPrompt">🔄 기본값으로 초기화</button>
      </div>
      <div class="prompt-status" id="promptStatus"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
